<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Evaluación de estudiante</title>
</head>
<body>
<script>
    let nota1 = prompt("Nota del primer trimestre");
    let nota2 = prompt("Nota del segundo trimestre:");
    let nota3 = prompt("Nota del tercer trimestre:");
    nota1=parseFloat(nota1);
    nota2=parseFloat(nota2);
    nota3=parseFloat(nota3);
    promedio=parseFloat(promedio);
    let promedio = (nota1 + nota2 + nota3) / 3;
    if (promedio >= 4.5) {
        alert("Apto. Has aprobado con una media de: " + promedio);
    } else {
        alert("No apto. Has suspendido con una media de: " + promedio);
    }
    document.write("<h1>La media es: " +promedio+ "</h1>");
</script>
</body>
</html>
