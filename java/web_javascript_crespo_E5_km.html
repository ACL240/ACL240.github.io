<html>
<head>
<title>m a Km </title>
</head>
<body>
<script>
//Variables:
let metros;
let kilómetros;
//Pido valores
metros=prompt("¿cuántos metros?");
//Floats
metros=parseFloat(metros);
//producto
kilómetros=metros*/1000;
//resultados
alert(kilómetros);
//
document.write("<h1>El resultado es: " +kilómetros+ "Km</h1>");
</script>
</body>
