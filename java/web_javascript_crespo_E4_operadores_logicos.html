   <!DOCTYPE html>
    <html lang="es">
    <head>
    <meta charset="UTF-8">
    <title>Ejercicio 04 — Operadores lógicos</title>
    </head>
    <body>
    <h1>Ejercicio 04 — Operadores lógicos</h1>
    <script>
   var A = 10;
   var B = 20;
  document.write("<h2>Resultados de operadores lógicos</h2>");
  document.write("<p>(A < B && B < A): " + (A < B && B < A) + "</p>");
  document.write("<p>(A < B || B < A): " + (A < B || B < A) + "</p>");
  document.write("<p>!(A < B): " + (!(A < B)) + "</p>");
  document.write("<p>(A > 8 && B < 15): " + (A > 8 && B < 15) + "</p>");
  document.write("<p>(A == 4 || B == 7): " + (A == 4 || B == 7) + "</p>");
  document.write("<p>(A > 7 && B < 1): " + (A > 7 && B < 1) + "</p>");
  document.write("<p>(A == 4 || B == 2): " + (A == 4 || B == 2) + "</p>");
   </script>
    </body>
    </html>
