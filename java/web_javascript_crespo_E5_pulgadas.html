<html>
<head>
<title>de pulgadas a cm</title>
</head>
<body>
<script>
//Variables:
let pulgadas;
let cm;
//Pido valores
pulgadas=prompt("¿Cuántas pulgadas?");
//Floats
pulgadas=parseFloat(pulgadas);
//producto
cm=pulgadas*2.54;
//resultados
alert(cm);
//
document.write("<h1>El resultado es: " +cm+ "cm</h1>");
</script>
</body>
