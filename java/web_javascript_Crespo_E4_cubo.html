<html>
<head>
<title>volumen del cubo </title>
</head>
<body>
<script>
//Variables:
let lado;
let area;
let volumen;
//Pido valores
lado=prompt("Dame el lado");
//Floats
lado=parseFloat(lado);
//producto
area=lado*lado;
volumen=area*lado;
//resultados
alert(volumen);
//
document.write("<h1>El resultado es: " +volumen+ "u³</h1>");
</script>
</body>
