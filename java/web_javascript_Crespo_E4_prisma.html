<html>
<head>
<title>Volumen del prisma </title>
</head>
<body>
<script>
//Variables:
let lado_1;
let lado_2;
let area;
let volumen;
let altura;
//Pido valores
lado_1=prompt("Dame el lado_1");
lado_2=prompt("Dame el lado_2");
altura=prompt("Dame la altura");
//Floats
lado_1=parseFloat(lado_1);
lado_2=parseFloat(lado_2);
altura=parseFloat(altura);
//producto
area=lado_1*lado_2;
volumen=area*altura
//resultados
alert(volumen);
//
document.write("<h1>El resultado es: " +volumen+ "u³</h1>");
</script>
</body>
