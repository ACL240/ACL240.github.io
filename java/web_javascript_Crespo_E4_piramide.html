<html>
<head>
<title>Volumen de la pirámide </title>
</head>
<body>
<script>
//Variables:
let lado_1;
let lado_2;
let altura;
let area;
let volumen;
//Pido valores
lado_1=prompt("Dame el lado_a");
lado_2=prompt("Dame el lado_b");
altura=prompt("Dame la altura");
//Floats
lado_1=parseFloat(lado_1);
lado_2=parseFloat(lado_2);
altura=parseFloat(altura);
//producto
area=lado_1*lado_2;
volumen=(area*altura)/3
//resultados
alert(volumen);
//
document.write("<h1>El resultado es: " +volumen+ "u²</h1>");
</script>
</body>
