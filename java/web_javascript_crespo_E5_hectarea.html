<html>
<head>
<title>producto </title>
</head>
<body>
<script>
//Variables:
let hectáreas;
let metros;
//Pido valores
hectáreas=prompt("¿Cuántas hectáreas?");
//Floats
hectáreas=parseFloat(hectáreas);
//producto
metros=hectáreas*10000;
//resultados
alert(metros);
//
document.write("<h1>El resultado es: " +metros+ "</h1>");
</script>
</body>
