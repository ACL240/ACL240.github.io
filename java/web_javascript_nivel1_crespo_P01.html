  <body>
    <h1>P01 — Consola, tipos y operadores</h1>
    <p>Abre la consola del navegador para ver parte de los resultados (F12).</p>
    <script>
      // BLOQUE 1 — Secuencia
alert("Pasos para ir al instituto");
alert("Paso 1: Levantarse con el buen pie");
alert("Paso 2: Desayunar");
alert("Paso 3: Lavarse los dientes");
alert("Paso 4: Vestirse y salir de casa (si eso)");
      // BLOQUE 2 — Consola: + con tipos var x = 16 + 4; console.log(x); // escribe aquí lo que sale
var x = "16" + "Blue"; console.log(x); //16Blue
var x = 16 + 4 + "Blue"; console.log(x); //20Blue
var x = "Blue" + 16 + 4; console.log(x); //Blue164
    // BLOQUE 3 — Consola: undefined y cambios de tipo var x; console.log(x); // escribe aquí lo que sale
var x = 5; console.log(x); //5
var x = "Juan"; console.log(x); //Juan
// BLOQUE 4.1 — Prioridad aritmética 
var resultado_0 = 33 - 12 / 2;
var resultado_1 = (33 - 12) / 2;
var resultado_2 = 33 - 12 * 2; 
var resultado_3 = 33 - 12 ** 2;
var resultado_4 = (33 - 12) ** 2; 
var resultado_5 = 33 - 12 * 2 ** 2;
var resultado_6 = 33 - 12 / 2 ** 2;
console.log("resultado_0 =", resultado_0);
console.log("resultado_1 =", resultado_1); 
console.log("resultado_2 =", resultado_2); 
console.log("resultado_3 =", resultado_3); 
console.log("resultado_4 =", resultado_4); 
console.log("resultado_5 =", resultado_5);
console.log("resultado_6 =", resultado_6);
 </script>
  </body>
