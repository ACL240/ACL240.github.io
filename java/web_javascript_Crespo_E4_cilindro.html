<html>
<head>
<title>volúmen del cilindro </title>
</head>
<body>
<script>
//Variables:
let radio;
let altura;
let area;
let volumen;
//Pido valores
radio=prompt("Dame el radio");
//Floats
radio=parseFloat(radio);
//producto
area=Math.PI*radio*radio;
volumen=area*altura
//resultados
alert(volumen);
//
document.write("<h1>El resultado es: " +volumen+ "u³</h1>");
</script>
</body>
