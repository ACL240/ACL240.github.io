    <!DOCTYPE html>
    <html lang="es">
    <head>
    <meta charset="UTF-8">
    <title>Ejercicio 03 — Operadores binarios</title>
    </head>
    <body>
    <h1>Ejercicio 03 — Operadores binarios</h1>

    <script>
    var A = 10;
    var B = 20;   
    var multiplica = A * B;
    var divide = A / B;
    var suma = A + B;
    var resta = A - B;
document.write("<h2>Resultados aritméticos</h2>");
document.write("<p>Multiplicación: " + A + " * " + B + " = " + multiplica + "</p>");
document.write("<p>División: " + A + " / " + B + " = " + divide + "</p>");
document.write("<p>Suma: " + A + " + " + B + " = " + suma + "</p>");
document.write("<p>Resta: " + A + " - " + B + " = " + resta + "</p>");
document.write("<h2>Operadores de comparación</h2>");
document.write("<p>El resultado de evaluar si " + A + " y " + B + " son iguales es: " + (A == B) + "</p>");
document.write("<p>El resultado de evaluar si " + A + " y " + B + " son distintos es: " + (A != B) + "</p>");
document.write("<p>El resultado de evaluar si " + A + " es menor que " + B + " es: " + (A < B) + "</p>");
document.write("<p>El resultado de evaluar si " + A + " es mayor que " + B + " es: " + (A > B) + "</p>");
    </script>

    </body>
    </html>
